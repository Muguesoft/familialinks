<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1D9E75">
  <meta name="description" content="Links compartidos de la familia, organizados y fáciles de encontrar">
  <title>FamiliaLinks</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════
     PANTALLA DE LOGIN
════════════════════════════════════════════ -->
<div id="loginScreen" class="screen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#1D9E75"/>
        <path d="M10 28 L20 12 L30 28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="20" cy="28" r="3" fill="white"/>
      </svg>
      <h1 class="logo-text">familia<span>links</span></h1>
      <p class="logo-sub">Links compartidos, fáciles de encontrar</p>
    </div>

    <p class="login-prompt">¿Quién sos?</p>
    <div class="user-grid" id="userGrid">
      <div class="loading-placeholder">Conectando...</div>
    </div>

    <div class="login-divider">o agregá tu nombre</div>
    <div class="new-user-row">
      <input class="form-input" id="newUserInput" placeholder="Tu nombre..." maxlength="30">
      <button class="btn-outline" id="addUserBtn">Agregar</button>
    </div>

    <button class="btn-primary full-width" id="loginBtn" disabled>Entrar</button>
    <p class="login-footer" id="loginStatus"></p>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     APP PRINCIPAL
════════════════════════════════════════════ -->
<div id="mainApp" class="screen hidden">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menú">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <line x1="2" y1="4" x2="16" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="14" x2="16" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="logo-text small">familia<span>links</span></span>
    </div>
    <div class="topbar-right">
      <span class="top-stats" id="topStats"></span>
      <button class="user-pill" id="userPill">
        <div class="user-avatar" id="topAvatar"></div>
        <span id="topUserName"></span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <div class="app-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Categorías</div>
        <nav id="catList"></nav>
        <button class="add-cat-btn" id="addCatBtn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Nueva categoría
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Plataforma</div>
        <nav id="platformList"></nav>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Miembro</div>
        <nav id="memberList"></nav>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Contenido principal -->
    <main class="content">
      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="search" id="searchInput" placeholder="Buscar por título, descripción o tags..." class="search-input">
          <button class="search-clear hidden" id="searchClear">✕</button>
        </div>
        <button class="btn-primary" id="addLinkBtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Agregar link
        </button>
      </div>

      <div class="tags-filter" id="tagsFilter"></div>

      <div class="section-header" id="sectionHeader"></div>

      <div class="cards-grid" id="cardsGrid">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Cargando links...</p>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     MODAL: AGREGAR / EDITAR LINK
════════════════════════════════════════════ -->
<div class="overlay hidden" id="linkModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="linkModalTitle">Agregar link</h2>
      <button class="modal-close" data-close="linkModal">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">URL del link *</label>
      <div class="url-row">
        <input class="form-input" id="urlInput" type="url" placeholder="https://...">
        <button class="btn-outline btn-ai" id="analyzeBtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1l1.5 3.5L12 6l-3.5 1.5L7 11l-1.5-3.5L2 6l3.5-1.5L7 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
          Analizar con IA
        </button>
      </div>
    </div>

    <div class="ai-strip hidden" id="aiStrip">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1l1.5 3.5L12 6l-3.5 1.5L7 11l-1.5-3.5L2 6l3.5-1.5L7 1z" stroke="#1D9E75" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
      <span id="aiStripText"></span>
    </div>

    <div class="form-group">
      <label class="form-label">Título *</label>
      <input class="form-input" id="titleInput" placeholder="Ej: Risotto de hongos al vino blanco" maxlength="120">
    </div>

    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea class="form-textarea" id="descInput" placeholder="¿De qué trata? Anotá lo que te pareció interesante..." maxlength="500"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Categoría</label>
        <select class="form-select" id="catSelect"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Plataforma</label>
        <select class="form-select" id="platformSelect">
          <option value="instagram">Instagram</option>
          <option value="facebook">Facebook</option>
          <option value="tiktok">TikTok</option>
          <option value="youtube">YouTube</option>
          <option value="web">Web / Otro</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Tags <span class="label-hint">(Enter para agregar)</span></label>
      <div class="tags-input-wrap" id="tagsWrap">
        <input class="tag-text-input" id="tagTextInput" placeholder="Ej: vegano, fácil, sin horno...">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-outline" data-close="linkModal">Cancelar</button>
      <button class="btn-primary" id="saveLinkBtn">Guardar link</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     MODAL: NUEVA CATEGORÍA
════════════════════════════════════════════ -->
<div class="overlay hidden" id="catModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title">Nueva categoría</h2>
      <button class="modal-close" data-close="catModal">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input class="form-input" id="catNameInput" placeholder="Ej: Jardinería" maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <input class="form-input emoji-input" id="catEmojiInput" placeholder="🌿" maxlength="4">
    </div>
    <div class="modal-actions">
      <button class="btn-outline" data-close="catModal">Cancelar</button>
      <button class="btn-primary" id="saveCatBtn">Crear categoría</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     MODAL: DETALLE DE LINK
════════════════════════════════════════════ -->
<div class="overlay hidden" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="detailTitle"></h2>
      <button class="modal-close" data-close="detailModal">✕</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     MODAL: CONFIRMAR LOGOUT
════════════════════════════════════════════ -->
<div class="overlay hidden" id="userMenu">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 class="modal-title" id="userMenuName"></h2>
      <button class="modal-close" data-close="userMenu">✕</button>
    </div>
    <div style="padding: 0.5rem 0 1rem">
      <p style="font-size:13px;color:var(--text-secondary)">Sesión activa en este dispositivo.</p>
    </div>
    <div class="modal-actions">
      <button class="btn-outline" data-close="userMenu">Cancelar</button>
      <button class="btn-danger" id="logoutBtn">Cerrar sesión</button>
    </div>
  </div>
</div>

<!-- Toast notifications -->
<div id="toastContainer" class="toast-container"></div>

<!-- Firebase SDK -->
<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/app.js"></script>

<!-- Service Worker -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js")
        .catch(err => console.warn("SW no registrado:", err));
    });
  }
</script>
</body>
</html>
